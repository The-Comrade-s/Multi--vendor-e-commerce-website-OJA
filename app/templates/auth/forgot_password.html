{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-5 py-16">
  <h1 class="text-2xl font-bold font-display text-center mb-1">Forgot your password?</h1>
  <p class="text-center text-[#6B6480] text-sm mb-6">Enter your email and we'll send you a reset link.</p>
  <form method="POST" class="bg-white border border-[#E7E3F5] rounded-2xl p-6 space-y-4">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="text-xs font-semibold mb-1.5 block">Email Address</label>
      <input type="email" name="email" required class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500">
    </div>
    <button type="submit" class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold rounded-xl py-2.5">Send Reset Link</button>
  </form>
  <p class="text-center text-sm text-[#6B6480] mt-4"><a href="{{ url_for('auth.login') }}" class="text-violet-600 font-semibold">Back to log in</a></p>
</div>
{% endblock %}
