{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-5 py-16">
  <h1 class="text-2xl font-bold font-display text-center mb-1">Set a new password</h1>
  <form method="POST" class="bg-white border border-[#E7E3F5] rounded-2xl p-6 space-y-4 mt-6">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="text-xs font-semibold mb-1.5 block">New Password</label>
      <input type="password" name="password" required minlength="6" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500">
    </div>
    <div>
      <label class="text-xs font-semibold mb-1.5 block">Confirm Password</label>
      <input type="password" name="confirm_password" required minlength="6" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500">
    </div>
    <button type="submit" class="w-full bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold rounded-xl py-2.5">Update Password</button>
  </form>
</div>
{% endblock %}
