{% extends "base.html" %}
{% block title %}Reports & Analytics{% endblock %}
{% block content %}
<div class="max-w-[1400px] mx-auto px-5 py-6 grid md:grid-cols-[220px_1fr] gap-6">
  {% include "partials/admin_sidebar.html" %}
  <div class="space-y-5">
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white border border-[#E7E3F5] rounded-2xl p-5"><p class="text-xs font-semibold text-[#6B6480]">Total Revenue (paid orders)</p><p class="text-2xl font-bold mt-1.5 font-display font-mono">{{ total_revenue | naira }}</p></div>
      <div class="bg-white border border-[#E7E3F5] rounded-2xl p-5"><p class="text-xs font-semibold text-[#6B6480]">Paid Orders</p><p class="text-2xl font-bold mt-1.5 font-display">{{ order_count }}</p></div>
    </div>
    <div class="grid lg:grid-cols-2 gap-5">
      <div class="bg-white border border-[#E7E3F5] rounded-2xl p-5">
        <h3 class="font-bold text-sm mb-3">Top Vendors by Revenue</h3>
        <canvas id="vendorChart" height="200"></canvas>
      </div>
      <div class="bg-white border border-[#E7E3F5] rounded-2xl p-5">
        <h3 class="font-bold text-sm mb-3">Products by Category</h3>
        <canvas id="categoryChart" height="200"></canvas>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
  new Chart(document.getElementById('vendorChart'), {
    type: 'bar',
    data: { labels: {{ vendor_labels | tojson }}, datasets: [{ label: 'Revenue (₦)', data: {{ vendor_revenues | tojson }}, backgroundColor: '#4338CA', borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
  new Chart(document.getElementById('categoryChart'), {
    type: 'doughnut',
    data: { labels: {{ category_labels | tojson }}, datasets: [{ data: {{ category_counts | tojson }}, backgroundColor: ['#5B21B6','#F59E0B','#2563EB','#E11D48','#10B981','#F97316','#0EA5E9','#DB2777'] }] },
  });
</script>
{% endblock %}
