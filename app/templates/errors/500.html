{% extends "base.html" %}
{% block title %}Something Went Wrong{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-5 py-24 text-center">
  <i class="bi bi-exclamation-triangle text-5xl text-amber-500"></i>
  <h1 class="text-2xl font-bold font-display mt-4">Something Went Wrong</h1>
  <p class="text-sm text-[#6B6480] mt-2">We hit an unexpected error. Please try again.</p>
  <a href="{{ url_for('main.home') }}" class="inline-block mt-5 bg-violet-600 text-white text-sm font-semibold rounded-xl px-5 py-2.5">Back to Home</a>
</div>
{% endblock %}
