{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<div class="max-w-[1400px] mx-auto px-5 py-6 grid md:grid-cols-[220px_1fr] gap-6">
  {% include "partials/vendor_sidebar.html" %}
  <div class="space-y-5">
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white border border-[#E7E3F5] rounded-2xl p-5"><p class="text-xs font-semibold text-[#6B6480]">Total Revenue</p><p class="text-2xl font-bold mt-1.5 font-display font-mono">{{ total_revenue | naira }}</p></div>
      <div class="bg-white border border-[#E7E3F5] rounded-2xl p-5"><p class="text-xs font-semibold text-[#6B6480]">Units Sold</p><p class="text-2xl font-bold mt-1.5 font-display">{{ total_units }}</p></div>
    </div>
    <div class="bg-white border border-[#E7E3F5] rounded-2xl p-5">
      <h3 class="font-bold text-sm mb-3">Top Products by Revenue</h3>
      <canvas id="topProductsChart" height="120"></canvas>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
  const labels = {{ top_product_labels | tojson }};
  const revenues = {{ top_product_revenues | tojson }};
  new Chart(document.getElementById('topProductsChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Revenue (₦)', data: revenues, backgroundColor: '#5B21B6', borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
</script>
{% endblock %}
