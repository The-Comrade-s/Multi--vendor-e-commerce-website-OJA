{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block content %}
<div class="max-w-[1400px] mx-auto px-5 py-6 grid md:grid-cols-[220px_1fr] gap-6">
  {% include "partials/vendor_sidebar.html" %}
  <div class="bg-white border border-[#E7E3F5] rounded-2xl p-6 max-w-2xl">
    <h3 class="font-bold mb-4">Add New Product</h3>
    <form method="POST" class="space-y-4">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="grid md:grid-cols-2 gap-4">
        <div class="md:col-span-2"><label class="text-xs font-semibold mb-1.5 block">Product Name</label><input name="name" required placeholder="e.g. Wireless Bluetooth Speaker" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500"></div>
        <div>
          <label class="text-xs font-semibold mb-1.5 block">Category</label>
          <select name="category_id" required class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500">
            <option value="">Select a category</option>
            {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold mb-1.5 block">Icon (Bootstrap Icons class)</label>
          <input name="icon" value="bi-box-seam" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <div><label class="text-xs font-semibold mb-1.5 block">Price (₦)</label><input name="price" type="number" step="0.01" required placeholder="25000" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500"></div>
        <div><label class="text-xs font-semibold mb-1.5 block">Compare-at Price (₦)</label><input name="compare_at_price" type="number" step="0.01" placeholder="32000" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500"></div>
        <div><label class="text-xs font-semibold mb-1.5 block">Stock Quantity</label><input name="stock" type="number" required placeholder="50" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500"></div>
        <div><label class="text-xs font-semibold mb-1.5 block">SKU</label><input name="sku" placeholder="OJA-SPK-001" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500"></div>
      </div>
      <div><label class="text-xs font-semibold mb-1.5 block">Description</label><textarea name="description" class="w-full bg-[#F7F6FB] border border-[#E7E3F5] rounded-xl px-3.5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-violet-500 h-24" placeholder="Describe the product..."></textarea></div>
      <div class="flex gap-3">
        <button type="submit" class="bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-semibold rounded-xl px-5 py-2.5">Publish Product</button>
        <a href="{{ url_for('vendor.products') }}" class="border border-[#E7E3F5] rounded-xl px-5 py-2.5 font-semibold text-sm">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
